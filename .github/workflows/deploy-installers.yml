name: Deploy Installers

on:
  workflow_run:
    workflows:
      - Release Stable
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: Copy installer scripts
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy scripts with SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASSWORD }}
          source: "scripts/install.sh,scripts/uninstall.sh"
          target: "/var/www/terrorserver"
          strip_components: 1
